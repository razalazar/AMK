name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/evomem
    permissions:
      id-token: write # Requerido para Trusted Publishing (OIDC)
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install build tools
      run: python -m pip install --upgrade build
    - name: Build package
      run: python -m build
    - name: Publish package
      uses: pypa/github-action-pypi-publish@release/v1
